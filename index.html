<!DOCTYPE html>
<html lang="en">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Results Summary Component</title>
   <link rel="stylesheet" href="styles.css">
 </head>
 <body>
   <main class="container">
     <section class="result">
       <h2 class="result-title">Your Result</h2>

       <div class="score-circle">
         <p class="score">76</p>
         <p class="total">of 100</p>
       </div>

       <h3 class="result-rating">Great</h3>

       <p class="result-description">
         You scored higher than 65% of the people who have taken these tests.
       </p>
     </section>

     <section class="summary">
       <h2 class="summary-title">Summary</h2>

       <div class="summary-item reaction red">
         <span class="category-label">
           <img src="assets\images\icon-reaction.svg" alt="Reaction">
           <span class="category">Reaction</span>
         </span>
         <span class="score-text"><strong>80</strong> / 100</span>
       </div>

       <div class="summary-item memory yellow">
         <span class="category-label">
           <img src="assets\images\icon-memory.svg" alt="Memory">
           <span class="category">Memory</span>
         </span>
         <span class="score-text"><strong>92</strong> / 100</span>
       </div>

       <div class="summary-item verbal green">
         <span class="category-label">
           <img src="assets\images\icon-verbal.svg" alt="Verbal">
           <span class="category">Verbal</span>
         </span>
         <span class="score-text"><strong>61</strong> / 100</span>
       </div>

       <div class="summary-item visual blue">
         <span class="category-label">
           <img src="assets\images\icon-visual.svg" alt="Visual">
           <span class="category">Visual</span>
         </span>
         <span class="score-text"><strong>73</strong> / 100</span>
       </div>

       <button class="continue-btn">Continue</button>
     </section>
   </main>
 </body>
</html>
